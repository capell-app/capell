name: Asset Formatting

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/**/*.js'
      - 'packages/**/*.css'
      - 'packages/**/*.yml'
      - 'packages/**/*.blade.php'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/asset-formatting.yml'

permissions:
  contents: read

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '18.18.0'
          cache: npm

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: pint

      - name: Install npm dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npx prettier --check 'packages/**/*.{css,js,yml,blade.php}' '!packages/**/node_modules/**'
