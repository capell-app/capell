name: Independent package release

on:
  workflow_dispatch:
    inputs:
      plan_path:
        description: Approved release plan path in this commit
        required: true
        type: string
      resume_state_run_id:
        description: Optional prior workflow run ID containing release state
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: capell-public-release
  cancel-in-progress: false

jobs:
  prepare-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Validate committed release plan
        env:
          PLAN_PATH: ${{ inputs.plan_path }}
        run: |
          test -n "${PLAN_PATH}"
          case "/${PLAN_PATH}/" in
            *"/../"*|*"/./"*) echo 'Plan path must be normalized and workspace-relative.' >&2; exit 1 ;;
          esac
          case "${PLAN_PATH}" in
            /*) echo 'Plan path must be workspace-relative.' >&2; exit 1 ;;
          esac
          candidate="${GITHUB_WORKSPACE}/${PLAN_PATH}"
          test -f "${candidate}"
          resolved="$(realpath "${candidate}")"
          case "${resolved}" in
            "${GITHUB_WORKSPACE}"/*) ;;
            *) echo 'Plan path escapes the checked-out workspace.' >&2; exit 1 ;;
          esac
          php scripts/release.php validate "${resolved}"
          cp "${resolved}" "${RUNNER_TEMP}/release-plan.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: approved-release-plan
          path: ${{ runner.temp }}/release-plan.json
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: prepare-plan
    runs-on: ubuntu-latest
    steps:
      - name: Create split repository token
        id: split-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: capell-app
          repositories: admin,core,frontend,installer,marketplace
          permission-contents: write
          permission-workflows: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure split repository git credentials
        env:
          GH_TOKEN: ${{ steps.split-token.outputs.token }}
        run: |
          git config --global --unset-all credential.helper || true
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: approved-release-plan
          path: ${{ runner.temp }}/approved-plan
      - name: Check out the approved plan source
        env:
          RELEASE_PLAN: ${{ runner.temp }}/approved-plan/release-plan.json
        run: |
          source_commit="$(jq -r '.source.commit' "${RELEASE_PLAN}")"
          test "${source_commit}" != null
          git checkout --detach "${source_commit}"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        if: inputs.resume_state_run_id != ''
        with:
          name: release-plan-state
          path: ${{ runner.temp }}/resume-state
          run-id: ${{ inputs.resume_state_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
      - name: Validate prior state artifact
        if: inputs.resume_state_run_id != ''
        run: |
          test "$(find "${RUNNER_TEMP}/resume-state" -type f | wc -l | tr -d ' ')" = 1
          test -f "${RUNNER_TEMP}/resume-state/release-plan.json.state.json"
          cp "${RUNNER_TEMP}/resume-state/release-plan.json.state.json" "${RUNNER_TEMP}/approved-plan/release-plan.json.state.json"
      - name: Validate and publish the approved plan
        env:
          GH_TOKEN: ${{ steps.split-token.outputs.token }}
          RELEASE_PLAN: ${{ runner.temp }}/approved-plan/release-plan.json
          RELEASE_PREFLIGHT_SCRIPT: ${{ github.workspace }}/scripts/release-preflight.php
        run: |
          php scripts/release.php validate "${RELEASE_PLAN}"
          php scripts/release.php resume "${RELEASE_PLAN}"
          php scripts/release.php verify "${RELEASE_PLAN}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: release-plan-state
          path: ${{ runner.temp }}/approved-plan/release-plan.json.state.json
          if-no-files-found: ignore
          retention-days: 30

  public-release-smoke:
    needs: publish
    uses: ./.github/workflows/public-release-smoke.yml
    with:
      plan_path: release-plan.json
      plan_artifact: approved-release-plan
