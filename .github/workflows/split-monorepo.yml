name: monorepo-split

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: capell-public-release
  cancel-in-progress: false

jobs:
  split-monorepo:
    runs-on: ubuntu-latest
    steps:
      - name: Create split repository token
        id: split-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: capell-app
          repositories: admin,core,frontend,installer,marketplace
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - name: Verify repositories and release tags
        env:
          GH_TOKEN: ${{ steps.split-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          echo '{}' > "${RUNNER_TEMP}/pre-split-main-shas.json"
          while IFS= read -r package; do
            main_sha="$(gh api "repos/capell-app/${package}/git/ref/heads/main" --jq '.object.sha')"
            jq --arg package "${package}" --arg sha "${main_sha}" \
              '. + {($package): $sha}' "${RUNNER_TEMP}/pre-split-main-shas.json" \
              > "${RUNNER_TEMP}/pre-split-main-shas.next.json"
            mv "${RUNNER_TEMP}/pre-split-main-shas.next.json" "${RUNNER_TEMP}/pre-split-main-shas.json"

            if gh api "repos/capell-app/${package}/git/ref/tags/${RELEASE_TAG}" --silent 2>/dev/null; then
              echo "Tag ${RELEASE_TAG} already exists in capell-app/${package}." >&2
              exit 1
            fi
          done < <(jq -r '.[]' config/release-packages.json)
      - name: Mark split transaction started
        id: split-start
        run: echo 'started=true' >> "${GITHUB_OUTPUT}"
      - name: Split admin
        uses: danharrin/monorepo-split-github-action@14e42e2437f674b8987c1f50ca3689116aea1893 # v2.4.5
        env: { GITHUB_TOKEN: 'x-access-token:${{ steps.split-token.outputs.token }}' }
        with:
          {
            package_directory: packages/admin,
            repository_organization: capell-app,
            repository_name: admin,
            branch: main,
            tag: '${{ github.event.release.tag_name }}',
            user_name: capell-app,
            user_email: appcapello@gmail.com,
          }
      - name: Split core
        uses: danharrin/monorepo-split-github-action@14e42e2437f674b8987c1f50ca3689116aea1893 # v2.4.5
        env: { GITHUB_TOKEN: 'x-access-token:${{ steps.split-token.outputs.token }}' }
        with:
          {
            package_directory: packages/core,
            repository_organization: capell-app,
            repository_name: core,
            branch: main,
            tag: '${{ github.event.release.tag_name }}',
            user_name: capell-app,
            user_email: appcapello@gmail.com,
          }
      - name: Split frontend
        uses: danharrin/monorepo-split-github-action@14e42e2437f674b8987c1f50ca3689116aea1893 # v2.4.5
        env: { GITHUB_TOKEN: 'x-access-token:${{ steps.split-token.outputs.token }}' }
        with:
          {
            package_directory: packages/frontend,
            repository_organization: capell-app,
            repository_name: frontend,
            branch: main,
            tag: '${{ github.event.release.tag_name }}',
            user_name: capell-app,
            user_email: appcapello@gmail.com,
          }
      - name: Split installer
        uses: danharrin/monorepo-split-github-action@14e42e2437f674b8987c1f50ca3689116aea1893 # v2.4.5
        env: { GITHUB_TOKEN: 'x-access-token:${{ steps.split-token.outputs.token }}' }
        with:
          {
            package_directory: packages/installer,
            repository_organization: capell-app,
            repository_name: installer,
            branch: main,
            tag: '${{ github.event.release.tag_name }}',
            user_name: capell-app,
            user_email: appcapello@gmail.com,
          }
      - name: Split marketplace
        uses: danharrin/monorepo-split-github-action@14e42e2437f674b8987c1f50ca3689116aea1893 # v2.4.5
        env: { GITHUB_TOKEN: 'x-access-token:${{ steps.split-token.outputs.token }}' }
        with:
          {
            package_directory: packages/marketplace,
            repository_organization: capell-app,
            repository_name: marketplace,
            branch: main,
            tag: '${{ github.event.release.tag_name }}',
            user_name: capell-app,
            user_email: appcapello@gmail.com,
          }
      - name: Compensate release tags after a split failure
        if: failure() && steps.split-start.outputs.started == 'true'
        env:
          GH_TOKEN: ${{ steps.split-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          encoded_tag="$(jq -rn --arg tag "${RELEASE_TAG}" '$tag|@uri')"
          while IFS= read -r package; do
            gh api --method DELETE "repos/capell-app/${package}/git/refs/tags/${encoded_tag}" --silent 2>/dev/null || true
            previous_sha="$(jq -r --arg package "${package}" '.[$package]' "${RUNNER_TEMP}/pre-split-main-shas.json")"
            gh api --method PATCH "repos/capell-app/${package}/git/refs/heads/main" \
              -f sha="${previous_sha}" -F force=true --silent
          done < <(jq -r '.[]' config/release-packages.json)

  public-release-smoke:
    needs: split-monorepo
    uses: ./.github/workflows/public-release-smoke.yml
    with:
      version: ${{ github.event.release.tag_name }}
