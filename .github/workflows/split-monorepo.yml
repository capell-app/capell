name: Independent package release

on:
  workflow_dispatch:
    inputs:
      plan_path:
        description: Approved release plan path in this commit
        required: true
        type: string
      resume_state_run_id:
        description: Optional prior workflow run ID containing release state
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: capell-public-release
  cancel-in-progress: false

jobs:
  prepare-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Validate committed release plan
        env:
          PLAN_PATH: ${{ inputs.plan_path }}
        run: |
          test -n "${PLAN_PATH}"
          case "/${PLAN_PATH}/" in
            *"/../"*|*"/./"*) echo 'Plan path must be normalized and workspace-relative.' >&2; exit 1 ;;
          esac
          case "${PLAN_PATH}" in
            /*) echo 'Plan path must be workspace-relative.' >&2; exit 1 ;;
          esac
          candidate="${GITHUB_WORKSPACE}/${PLAN_PATH}"
          test -f "${candidate}"
          resolved="$(realpath "${candidate}")"
          case "${resolved}" in
            "${GITHUB_WORKSPACE}"/*) ;;
            *) echo 'Plan path escapes the checked-out workspace.' >&2; exit 1 ;;
          esac
          php scripts/release.php validate "${resolved}"
          cp "${resolved}" "${RUNNER_TEMP}/release-plan.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: approved-release-plan
          path: ${{ runner.temp }}/release-plan.json
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: prepare-plan
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
      - name: Create split repository token
        id: split-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SPLIT_APP_ID }}
          private-key: ${{ secrets.SPLIT_APP_PRIVATE_KEY }}
          owner: capell-app
          repositories: admin,core,frontend,installer,marketplace
          permission-contents: write
          permission-workflows: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Stage and attest release tooling from the workflow commit
        env:
          RELEASE_TOOLING_COMMIT: ${{ github.sha }}
          RELEASE_TOOLING_ROOT: ${{ runner.temp }}/release-tooling
        run: |
          mkdir -p "${RELEASE_TOOLING_ROOT}"
          git archive "${RELEASE_TOOLING_COMMIT}" \
            scripts/release.php \
            scripts/release/ReleaseEngine.php \
            scripts/release-preflight.php \
            | tar -x -C "${RELEASE_TOOLING_ROOT}"
          for path in scripts/release.php scripts/release/ReleaseEngine.php scripts/release-preflight.php; do
            expected_blob="$(git rev-parse "${RELEASE_TOOLING_COMMIT}:${path}")"
            actual_blob="$(git hash-object "${RELEASE_TOOLING_ROOT}/${path}")"
            test "${actual_blob}" = "${expected_blob}"
          done
      - name: Configure split repository git credentials
        env:
          GH_TOKEN: ${{ steps.split-token.outputs.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --unset-all credential.helper || true
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: approved-release-plan
          path: ${{ runner.temp }}/approved-plan
      - name: Check out the approved plan source
        env:
          RELEASE_PLAN: ${{ runner.temp }}/approved-plan/release-plan.json
        run: |
          source_commit="$(jq -r '.source.commit' "${RELEASE_PLAN}")"
          test "${source_commit}" != null
          git checkout --detach "${source_commit}"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: inputs.resume_state_run_id != ''
        with:
          name: release-plan-state
          path: ${{ runner.temp }}/resume-state
          run-id: ${{ inputs.resume_state_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
      - name: Validate prior state artifact
        if: inputs.resume_state_run_id != ''
        run: |
          test "$(find "${RUNNER_TEMP}/resume-state" -type f | wc -l | tr -d ' ')" = 1
          test -f "${RUNNER_TEMP}/resume-state/release-plan.json.state.json"
          cp "${RUNNER_TEMP}/resume-state/release-plan.json.state.json" "${RUNNER_TEMP}/approved-plan/release-plan.json.state.json"
      - name: Validate and publish the approved plan
        env:
          GH_TOKEN: ${{ steps.split-token.outputs.token }}
          RELEASE_PLAN: ${{ runner.temp }}/approved-plan/release-plan.json
          RELEASE_TOOLING_ROOT: ${{ runner.temp }}/release-tooling
          CAPELL_RELEASE_SOURCE_ROOT: ${{ github.workspace }}
          RELEASE_PREFLIGHT_SCRIPT: ${{ runner.temp }}/release-tooling/scripts/release-preflight.php
        run: |
          php "${RELEASE_TOOLING_ROOT}/scripts/release.php" validate "${RELEASE_PLAN}"
          php "${RELEASE_TOOLING_ROOT}/scripts/release.php" resume "${RELEASE_PLAN}"
          php "${RELEASE_TOOLING_ROOT}/scripts/release.php" verify "${RELEASE_PLAN}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: release-plan-state
          path: ${{ runner.temp }}/approved-plan/release-plan.json.state.json
          if-no-files-found: ignore
          retention-days: 30

  public-release-smoke:
    needs: publish
    uses: ./.github/workflows/public-release-smoke.yml
    with:
      plan_path: release-plan.json
      plan_artifact: approved-release-plan
