name: Update Pest Shards

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'

concurrency:
  group: update-pest-shards
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pest-shards:
    name: Update time-balanced Pest shards
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.ACCESS_TOKEN }}"} }'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.4
          extensions: curl, dom, fileinfo, gd, intl, json, libxml, mbstring, pdo_sqlite, simplexml, sqlite3, zip
          tools: composer:v2
          coverage: none

      - name: Check Composer public files
        run: php scripts/check-composer-local-paths.php

      - name: Check Composer lock file
        run: composer run check:composer-lock

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --ansi --optimize-autoloader

      - name: Configure environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Update Pest shard timings
        # Not test:shards — Pest's --update-shards keys timings by namespaced class and
        # leaves unresolved files unweighted, so a single slow file can dominate a shard
        # while the estimated weights look level. test:shards:balance folds in real
        # per-file JUnit durations keyed by repo-relative path.
        run: composer run test:shards:balance

      - name: Open shard timing pull request
        run: |
          untracked_shards="$(git ls-files --others --exclude-standard tests/.pest/shards.json)"

          if git diff --quiet -- tests/.pest/shards.json && [ -z "${untracked_shards}" ]; then
            echo "Pest shard timings are already current."
            exit 0
          fi

          branch="chore/update-pest-shards-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add tests/.pest/shards.json
          git commit -m "chore: update Pest shard timings"
          git push --set-upstream origin "${branch}"
          gh pr create \
            --base main \
            --head "${branch}" \
            --title "Update Pest shard timings" \
            --body "Refreshes tests/.pest/shards.json for Pest time-balanced sharding."
