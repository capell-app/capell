name: Coverage

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  generate-coverage:
    name: Generate coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        php: [8.4]
        laravel: [13.*]
        db: [sqlite]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, fileinfo, intl, json, libxml, mbstring, simplexml, zip, pcov
          tools: composer:v2
          coverage: pcov

      - name: Check Composer public files
        run: php scripts/check-composer-local-paths.php

      - name: Check Composer lock file
        run: composer run check:composer-lock

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --ansi --optimize-autoloader

      - name: Configure environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Run release coverage (Clover)
        run: |
          mkdir -p coverage
          php -d memory_limit=-1 -d max_execution_time=0 -d pcov.enabled=1 -d pcov.directory=packages vendor/bin/pest --coverage --coverage-clover=coverage/clover.xml --colors=always --stop-on-error --stop-on-failure --configuration=phpunit.xml

      - name: Upload Clover XML for codecov
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pest-coverage-clover
          path: coverage/clover.xml

  publish-coverage:
    name: Publish coverage
    needs: generate-coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Clover XML
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pest-coverage-clover
          path: coverage

      - name: Publish coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          disable_search: true
          fail_ci_if_error: true
          files: coverage/clover.xml
          use_oidc: true
          version: v11.3.1
