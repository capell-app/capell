name: Release Coverage

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  release-coverage:
    name: Release coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.4]
        laravel: [13.*]
        db: [sqlite]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, fileinfo, intl, json, libxml, mbstring, simplexml, zip, pcov
          tools: composer:v2
          coverage: pcov

      - name: Check Composer public files
        run: php scripts/check-composer-local-paths.php

      - name: Check Composer lock file
        run: composer run check:composer-lock

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --ansi --optimize-autoloader

      - name: Configure environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Run release coverage (Clover)
        run: php -d memory_limit=-1 -d max_execution_time=0 -d pcov.enabled=1 -d pcov.directory=packages vendor/bin/pest --coverage --coverage-clover=coverage/clover.xml --colors=always --stop-on-error --stop-on-failure --configuration=phpunit.xml

      - name: Upload Clover XML for codecov
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pest-coverage-clover
          path: coverage/clover.xml
