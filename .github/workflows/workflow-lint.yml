name: 'Workflow Lint'

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  # Deliberately NOT paths-filtered. This job is a required status check, and a
  # required check that is skipped by a paths filter leaves every unrelated PR
  # blocked on "Expected - waiting for status" forever. The job is ~15s.
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.head_ref || github.ref }}-workflow-lint
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: '1.7.12'
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint --version

      - name: Lint workflows
        run: ./actionlint -color
