name: 'Dependabot Auto-Merge'

on:
  pull_request_target:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      # Minor and patch updates auto-merge for any dependency. Major updates
      # auto-merge only for first-party actions/* dependencies, because those
      # routinely bump their bundled Node runtime without changing our inputs.
      #
      # dependency-names is a comma-separated list, so a grouped PR can start
      # with an actions/* entry and carry unrelated dependencies behind it.
      # Reject anything containing a comma before trusting the prefix.
      - name: Enable auto-merge
        if: >-
          ${{
            steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
            steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
            (steps.metadata.outputs.update-type == 'version-update:semver-major' &&
             startsWith(steps.metadata.outputs.dependency-names, 'actions/') &&
             !contains(steps.metadata.outputs.dependency-names, ','))
          }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
