name: Build Frontend Package

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/frontend/**'
      - '.github/workflows/build-frontend-package.yml'

permissions:
  contents: read

jobs:
  build-frontend-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend
    env:
      ROLLUP_SKIP_NATIVE: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 20.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

  nested-checkout-resolution:
    runs-on: ubuntu-latest
    env:
      CAPELL_CHECKOUT: ${{ github.workspace }}/repositories/vendor/capell
    steps:
      - name: Checkout repository into a nested path
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: repositories/vendor/capell

      - name: Use PHP 8.4
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Use Node.js 20.x
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20.x'

      - name: Create a nested-path Laravel consumer
        run: |
          composer create-project --no-interaction --no-progress --prefer-dist laravel/laravel "${RUNNER_TEMP}/nested-consumer"
          cd "${RUNNER_TEMP}/nested-consumer"
          composer config minimum-stability dev
          composer config prefer-stable true
          composer config repositories.capell-core path "${CAPELL_CHECKOUT}/packages/core"
          composer config repositories.capell-frontend path "${CAPELL_CHECKOUT}/packages/frontend"
          composer require --no-interaction --no-progress --with-all-dependencies capell-app/core:@dev capell-app/frontend:@dev

      - name: Discover packages and build the generated Tailwind entrypoint
        working-directory: ${{ runner.temp }}/nested-consumer
        run: |
          php artisan package:discover --ansi
          php artisan capell:frontend-tailwind-assets --ansi
          generated_css="resources/css/capell/frontend.css"
          test -s "${generated_css}"
          grep --fixed-strings --quiet "vendor/capell-app/frontend/resources/css/capell-frontend.css" "${generated_css}"
          printf '@import "./capell/frontend.css";\n' > resources/css/app.css
          npm install --no-audit --no-fund
          npm run build
