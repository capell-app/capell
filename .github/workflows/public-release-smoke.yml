name: Plan-driven public release smoke

on:
  workflow_call:
    inputs:
      plan_path:
        required: true
        type: string
      plan_artifact:
        required: true
        type: string

permissions:
  contents: read

jobs:
  remote-solve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.plan_artifact }}
          path: ${{ runner.temp }}/approved-plan
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
      - name: Validate plan and solve its exact public package set
        env:
          RELEASE_PLAN: ${{ runner.temp }}/approved-plan/${{ inputs.plan_path }}
        run: |
          php "${GITHUB_WORKSPACE}/scripts/release.php" validate "${RELEASE_PLAN}"
          cd "$(mktemp -d)"
          composer init --no-interaction --name=capell-app/release-smoke
          while IFS=$'\t' read -r package version; do
            composer require --no-interaction --no-update "${package}:${version}"
          done < <(jq -r '.packages[] | [.name, .proposed_version] | @tsv' "${RELEASE_PLAN}")
          composer update --no-interaction --no-progress --prefer-dist
      - name: Fresh isolated Laravel consumer
        env:
          RELEASE_PLAN: ${{ runner.temp }}/approved-plan/${{ inputs.plan_path }}
        run: |
          cd "$(mktemp -d)"
          composer create-project --no-interaction --no-progress --prefer-dist laravel/laravel consumer
          cd consumer
          while IFS=$'\t' read -r package version; do
            composer require --no-interaction --no-update "${package}:${version}"
          done < <(jq -r '.packages[] | [.name, .proposed_version] | @tsv' "${RELEASE_PLAN}")
          composer update --no-interaction --no-progress --prefer-dist
          touch database/database.sqlite
          php artisan package:discover --ansi
          php artisan migrate --force --ansi
          php artisan capell:install --no-interaction --url=http://127.0.0.1:8000 --all-packages --theme=none --name='Release Smoke' --email=release@example.test --password='release-smoke-password' --clear-cache --install-welcome-route
          php artisan serve --host=127.0.0.1 --port=8000 > "${RUNNER_TEMP}/capell.log" 2>&1 &
          trap 'kill $!' EXIT
          for path in / /admin/login; do
            for attempt in {1..15}; do curl --fail --silent --show-error "http://127.0.0.1:8000${path}" >/dev/null && break; sleep 1; done
            curl --location --fail --silent --show-error "http://127.0.0.1:8000${path}" > "${RUNNER_TEMP}/response.html"
            test -s "${RUNNER_TEMP}/response.html"
          done
