name: Test

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'packages/**/*.php'
      - 'packages/**/composer.json'
      - 'tests/**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'docs/packages/catalog.md'
      - 'scripts/check-support-contract.php'
      - 'scripts/extract-phpstan-level.php'
      - 'docs/getting-started/install.md'
      - 'docs/getting-started/quickstart.md'
      - '.docker/Dockerfile'
      - '.github/workflows/test-fast-pr.yml'
      - '.github/workflows/test-full.yml'
      - 'phpunit.xml'

concurrency:
  group: ${{ github.head_ref || github.ref }}-phpunit-fast-pr
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    if: github.event.pull_request.draft == false
    name: Test - L${{ matrix.framework.laravel }} - shard ${{ matrix.shard }}/6
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        framework:
          - laravel: 12.*
            testbench: 10.*
          - laravel: 13.*
            testbench: 11.*
        shard: [1, 2, 3, 4, 5, 6]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Dependencies PHP
        id: php-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: vendor
          key: dependencies-php-8.4-laravel-${{ matrix.framework.laravel }}-testbench-${{ matrix.framework.testbench }}-sqlite-${{ hashFiles('composer.json', 'composer.lock', '.github/workflows/test-fast-pr.yml') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.4
          extensions: curl, dom, fileinfo, gd, intl, json, libxml, mbstring, pdo_sqlite, simplexml, sqlite3, zip
          tools: composer:v2
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Check Composer public files
        run: php scripts/check-composer-local-paths.php

      - name: Check Capell support contract
        run: composer run check:support-contract

      - name: Check Composer lock file
        run: composer run check:composer-lock

      - name: Install PHP dependencies
        if: steps.php-cache.outputs.cache-hit != 'true'
        run: |
          composer remove --no-interaction --no-progress --ansi --dev --no-update laravel/pao
          composer require --no-interaction --no-progress --ansi --no-update \
            "laravel/framework:${{ matrix.framework.laravel }}"
          composer require --no-interaction --no-progress --ansi --dev --no-update \
            "orchestra/testbench:${{ matrix.framework.testbench }}"

          composer update --no-interaction --no-progress --ansi --optimize-autoloader --with-all-dependencies -W

      - name: Configure environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Run test:fast
        run: PEST_SHARD=${{ matrix.shard }}/6 composer run test:fast:ci
