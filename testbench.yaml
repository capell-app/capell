  - Capell\Core\Providers\CapellServiceProvider
  - Capell\Admin\Providers\AdminServiceProvider
  - Capell\Frontend\Providers\FrontendServiceProvider
  - Capell\Marketplace\Providers\MarketplaceServiceProvider
  - Capell\Admin\Providers\Filament\AdminPanelProvider

migrations:
  - tests/database/migrations
  - packages/core/database/migrations
  - packages/marketplace/database/migrations

dont-discover:
  - spatie/laravel-ray

purge:
  directories:
    - database/migrations
