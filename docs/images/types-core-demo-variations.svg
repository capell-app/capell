<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Capell core and demo type variations</title>
  <desc id="desc">Diagram showing how Capell core types, demo starters, and artwork styles relate.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f1e8"/>
      <stop offset="0.46" stop-color="#eef2ec"/>
      <stop offset="1" stop-color="#ece9f1"/>
    </linearGradient>
    <linearGradient id="art" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16231f"/>
      <stop offset="0.52" stop-color="#a64b2a"/>
      <stop offset="1" stop-color="#efc15f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#18221d" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { fill: #16231f; font-family: Georgia, serif; font-size: 58px; font-weight: 700; letter-spacing: -1.6px; }
      .subtitle { fill: #536159; font-family: Verdana, sans-serif; font-size: 18px; }
      .eyebrow { fill: #7b4b31; font-family: Verdana, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2.4px; text-transform: uppercase; }
      .panel-title { fill: #16231f; font-family: Georgia, serif; font-size: 28px; font-weight: 700; }
      .panel-copy { fill: #536159; font-family: Verdana, sans-serif; font-size: 15px; line-height: 1.45; }
      .card-title { fill: #18221d; font-family: Verdana, sans-serif; font-size: 16px; font-weight: 700; }
      .card-copy { fill: #637168; font-family: Verdana, sans-serif; font-size: 12px; }
      .tiny { fill: #7f8a82; font-family: Verdana, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
      .line { stroke: #c3b8a7; stroke-width: 2; stroke-linecap: round; }
      .card { fill: rgba(255,255,255,0.74); stroke: #ddd3c4; stroke-width: 1.2; }
      .dark-card { fill: #16231f; }
      .dark-title { fill: #fffaf2; font-family: Verdana, sans-serif; font-size: 16px; font-weight: 700; }
      .dark-copy { fill: #d8d1c4; font-family: Verdana, sans-serif; font-size: 12px; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#background)"/>
  <circle cx="1248" cy="106" r="190" fill="#e1cfb6" opacity="0.35"/>
  <circle cx="126" cy="784" r="210" fill="#d7e0d2" opacity="0.52"/>
  <path d="M104 146 C292 66 420 116 534 64 C680 -2 802 48 956 42 C1114 36 1234 -18 1368 54" fill="none" stroke="#d4c7b5" stroke-width="2" opacity="0.7"/>

  <text x="84" y="92" class="eyebrow">Capell Library</text>
  <text x="84" y="158" class="title">Core explains. Demos persuade.</text>
  <text x="86" y="198" class="subtitle">Types hold the rules. Layouts compose the page. Artwork gives the same content a point of view.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="254" width="384" height="520" rx="34" fill="#fffaf2" stroke="#e2d7c8"/>
    <text x="112" y="308" class="eyebrow">Core structure</text>
    <text x="112" y="350" class="panel-title">System layer</text>
    <text x="112" y="382" class="panel-copy">Stable records that keep sites predictable, cache-safe, and easy to edit.</text>

    <rect x="112" y="430" width="148" height="74" rx="18" class="card"/>
    <text x="132" y="461" class="card-title">Site blueprints</text>
    <text x="132" y="484" class="card-copy">Where content lives</text>

    <rect x="282" y="430" width="148" height="74" rx="18" class="card"/>
    <text x="302" y="461" class="card-title">Page templates</text>
    <text x="302" y="484" class="card-copy">What a URL can do</text>

    <rect x="112" y="526" width="148" height="74" rx="18" class="card"/>
    <text x="132" y="557" class="card-title">Visual themes</text>
    <text x="132" y="580" class="card-copy">How output feels</text>

    <rect x="282" y="526" width="148" height="74" rx="18" class="card"/>
    <text x="302" y="557" class="card-title">Layout recipes</text>
    <text x="302" y="580" class="card-copy">Where content sits</text>

    <rect x="112" y="634" width="318" height="84" rx="22" class="dark-card"/>
    <text x="134" y="670" class="dark-title">Default, Home, Results, System</text>
    <text x="134" y="695" class="dark-copy">Core variations should read as useful rules, not templates with decoration.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="528" y="254" width="384" height="520" rx="34" fill="#fbf7ee" stroke="#e2d7c8"/>
    <text x="562" y="308" class="eyebrow">Demo starters</text>
    <text x="562" y="350" class="panel-title">Editorial layer</text>
    <text x="562" y="382" class="panel-copy">Seeded examples combine the same rules with pages, copy, blocks, and media.</text>

    <path d="M562 458 L734 402 L878 462 L704 520 Z" fill="#dba24e" opacity="0.8"/>
    <path d="M562 558 L734 502 L878 562 L704 620 Z" fill="#274139" opacity="0.92"/>
    <path d="M562 658 L734 602 L878 662 L704 720 Z" fill="#b9613b" opacity="0.8"/>

    <rect x="590" y="438" width="250" height="62" rx="18" fill="#fffaf2" opacity="0.92"/>
    <text x="614" y="466" class="card-title">Page sections</text>
    <text x="614" y="488" class="card-copy">Heroes, feature rows, CTAs, galleries</text>

    <rect x="590" y="538" width="250" height="62" rx="18" fill="#fffaf2" opacity="0.92"/>
    <text x="614" y="566" class="card-title">Widgets</text>
    <text x="614" y="588" class="card-copy">Breadcrumbs, latest pages, media, navigation</text>

    <rect x="590" y="638" width="250" height="62" rx="18" fill="#fffaf2" opacity="0.92"/>
    <text x="614" y="666" class="card-title">Starter examples</text>
    <text x="614" y="688" class="card-copy">Foundation, Studio, Editorial, Commerce, Cultural</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="978" y="254" width="384" height="520" rx="34" fill="#fffaf2" stroke="#e2d7c8"/>
    <text x="1012" y="308" class="eyebrow">Artwork variations</text>
    <text x="1012" y="350" class="panel-title">Design layer</text>
    <text x="1012" y="382" class="panel-copy">The same content model can carry different visual identities without leaking editor machinery.</text>

    <rect x="1012" y="428" width="316" height="194" rx="28" fill="url(#art)"/>
    <circle cx="1098" cy="508" r="54" fill="#fff1ce" opacity="0.85"/>
    <path d="M1168 594 C1204 506 1270 468 1328 446 L1328 622 L1168 622 Z" fill="#f5d276" opacity="0.75"/>
    <path d="M1028 586 C1094 548 1158 548 1228 622 L1028 622 Z" fill="#101915" opacity="0.8"/>

    <rect x="1012" y="654" width="144" height="64" rx="18" class="card"/>
    <text x="1030" y="681" class="card-title">Studio</text>
    <text x="1030" y="703" class="card-copy">Image-led, spacious</text>

    <rect x="1184" y="654" width="144" height="64" rx="18" class="card"/>
    <text x="1202" y="681" class="card-title">Editorial</text>
    <text x="1202" y="703" class="card-copy">Rhythm and reading</text>

    <rect x="1012" y="734" width="144" height="64" rx="18" class="card"/>
    <text x="1030" y="761" class="card-title">Commerce</text>
    <text x="1030" y="783" class="card-copy">Product stories</text>

    <rect x="1184" y="734" width="144" height="64" rx="18" class="card"/>
    <text x="1202" y="761" class="card-title">Cultural</text>
    <text x="1202" y="783" class="card-copy">Poster-like contrast</text>
  </g>

  <path d="M462 514 C494 514 496 514 528 514" class="line"/>
  <path d="M912 514 C944 514 946 514 978 514" class="line"/>
  <text x="480" y="494" class="tiny">Seed</text>
  <text x="930" y="494" class="tiny">Style</text>
</svg>
