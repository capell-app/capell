<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380" role="img" aria-labelledby="title desc">
    <title id="title">Installer extension contracts</title>
    <desc id="desc">Diagram showing how package manifests, install providers, actions, and settings migrations connect during installation.</desc>
    <rect width="960" height="380" rx="18" fill="#f8fafc"/>
    <g fill="#0f172a" font-family="Inter, Arial, sans-serif">
        <text x="48" y="58" font-size="28" font-weight="700">Installer Extension Contracts</text>
        <text x="48" y="88" font-size="15" fill="#475569">Packages own setup behavior; the installer orchestrates stable contracts.</text>
    </g>
    <g font-family="Inter, Arial, sans-serif" font-size="16">
        <rect x="48" y="132" width="190" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="74" y="168" fill="#0f172a" font-weight="700">capell.json</text>
        <text x="74" y="198" fill="#475569">install params</text>
        <text x="74" y="224" fill="#475569">dependencies</text>

        <rect x="294" y="132" width="190" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="320" y="168" fill="#0f172a" font-weight="700">Install Provider</text>
        <text x="320" y="198" fill="#475569">commands</text>
        <text x="320" y="224" fill="#475569">package boot</text>

        <rect x="540" y="132" width="190" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="566" y="168" fill="#0f172a" font-weight="700">Package Action</text>
        <text x="566" y="198" fill="#475569">structured Data</text>
        <text x="566" y="224" fill="#475569">progress reporter</text>

        <rect x="786" y="132" width="126" height="120" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
        <text x="812" y="168" fill="#0f172a" font-weight="700">State</text>
        <text x="812" y="198" fill="#475569">settings</text>
        <text x="812" y="224" fill="#475569">migrations</text>
    </g>
    <g fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M238 192h28"/>
        <path d="M254 180l12 12-12 12"/>
        <path d="M484 192h28"/>
        <path d="M500 180l12 12-12 12"/>
        <path d="M730 192h28"/>
        <path d="M746 180l12 12-12 12"/>
    </g>
</svg>
